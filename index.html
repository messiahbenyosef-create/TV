<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ערוץ האמת - שידור חי</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: black; overflow: hidden;
        }
        /* ה-pointer-events: none מאפשר לך לגרור בפריזם בחופשיות */
        iframe {
            width: 100%; height: 100%; border: none;
            pointer-events: none; 
        }
    </style>
</head>
<body>
    <iframe 
        src="https://www.youtube.com/embed/DcV7aLJvrlg?list=PL6CIuAjEdCPNYPThikfE9sj_wBg2cKYmy&autoplay=1&loop=1&playlist=PL6CIuAjEdCPNYPThikfE9sj_wBg2cKYmy&controls=0&modestbranding=1&rel=0" 
        allow="autoplay; fullscreen">
    </iframe>
</body>
</html>
